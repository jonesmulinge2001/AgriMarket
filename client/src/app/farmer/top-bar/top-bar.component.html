<header
  class="fixed top-0 right-0 left-0 h-16 flex items-center justify-between px-6 shadow z-30"
  [ngClass]="isDarkMode ? 'bg-gray-900 text-white' : 'bg-white text-gray-800'"
>

  <!-- Left Section -->
  <div class="flex items-center gap-4">

    <!-- Sidebar Toggle -->
    <button
      (click)="sidebarToggle.emit()"
      class="p-2 rounded hover:bg-gray-200"
      [ngClass]="isDarkMode ? 'hover:bg-gray-700' : ''"
    >
      <span class="material-icons">
        {{ sidebarCollapsed ? 'menu' : 'menu_open' }}
      </span>
    </button>

    <!-- Page Title -->
    <h1 class="font-semibold text-lg">
      Farmer Dashboard
    </h1>

  </div>

  <!-- Middle Section (Search) -->
  <div class="hidden md:block w-96">
    <div class="relative">

      <span class="material-icons absolute left-3 top-2.5 text-gray-400">
        search
      </span>

      <input
        type="text"
        placeholder="Search products, orders..."
        class="w-full pl-10 pr-4 py-2 rounded-lg border focus:outline-none focus:ring-2 focus:ring-green-500"
        [ngClass]="isDarkMode ? 'bg-gray-800 border-gray-700 text-white' : ''"
      />

    </div>
  </div>

  <!-- Right Section -->
  <div class="flex items-center gap-4">

    <!-- Dark Mode Toggle -->
    <button
      (click)="darkModeToggle.emit()"
      class="p-2 rounded hover:bg-gray-200"
      [ngClass]="isDarkMode ? 'hover:bg-gray-700' : ''"
    >
      <span class="material-icons">
        {{ isDarkMode ? 'light_mode' : 'dark_mode' }}
      </span>
    </button>

    <!-- Notifications -->
    <button class="relative p-2 rounded hover:bg-gray-200"
      [ngClass]="isDarkMode ? 'hover:bg-gray-700' : ''"
    >
      <span class="material-icons">notifications</span>

      <span class="absolute -top-1 -right-1 bg-red-500 text-white text-xs px-1 rounded-full">
        0
      </span>
    </button>

  </div>

</header>
