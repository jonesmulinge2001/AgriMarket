<div class="bg-gray-50 min-h-screen flex">
  <!-- Super Admin Sidebar (fixed) -->
  <app-super-admin-sidebar
    [isCollapsed]="isCollapsed"
  ></app-super-admin-sidebar>

  <!-- Main content -->
  <div class="flex-1 flex flex-col transition-all duration-300"
       [ngStyle]="{ 'margin-left.px': isCollapsed ? 80 : 288 }">
    
    <!-- Topbar -->
    <app-topbar
      [sidebarCollapsed]="isCollapsed"
      (sidebarToggle)="toggleSidebar()"
    ></app-topbar>

    <!-- Router outlet for admin pages -->
    <main class="flex-1 p-6 mt-16">
      <div class="bg-gray-50 rounded-lg min-h-full">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>
</div>
